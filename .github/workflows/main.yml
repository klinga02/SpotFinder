name: SpotFinder Bot

on:
  schedule:
    - cron: '*/15 * * * *' # Körs var 15:e minut
  workflow_dispatch:      # Gör att du kan starta den manuellt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Ger roboten rätt att spara i history.txt
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Hämtar hela historiken för att undvika synk-fel

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py

      - name: Save progress
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Se till att filen finns så vi inte får felmeddelanden
          touch history.txt
          
          # 2. Lägg till filen i kön
          git add history.txt
          
          # 3. Försök skapa ett "paket" (commit) av ändringarna
          if git commit -m "Uppdatera historik [skip ci]"; then
            # 4. Om det fanns något nytt, hämta ev. ändringar från servern
            # och lägg vår nya data "överst" (rebase)
            git pull origin main --rebase
            
            # 5. Skicka upp till GitHub
            git push origin main
          else
            echo "Ingen ny data att spara denna gång."
          fi
